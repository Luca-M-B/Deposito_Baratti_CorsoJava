<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek To-Do List | Task Management</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons for premium feel -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>My Agenda</h1>
            <p>Gestisci i tuoi task con stile ed efficienza</p>
        </header>

        <div class="glass-card">
            <form id="todo-form" class="todo-form">
                <div class="form-group">
                    <label for="titolo">Titolo Task</label>
                    <input type="text" id="titolo" placeholder="Es. Finire il progetto Spring..." required>
                </div>
                
                <div class="form-group">
                    <label for="descrizione">Descrizione</label>
                    <textarea id="descrizione" placeholder="Aggiungi dettagli extra..."></textarea>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="priorita">Priorità</label>
                        <select id="priorita">
                            <option value="BASSA">Bassa</option>
                            <option value="MEDIA">Media</option>
                            <option value="ALTA">Alta</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="stato">Stato Iniziale</label>
                        <select id="stato">
                            <option value="TO_DO">Da Fare</option>
                            <option value="IN_PROGRESS">In Corso</option>
                            <option value="DONE">Completato</option>
                            <option value="CANCELLED">Annullato</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submit-btn">
                    <i data-lucide="plus" style="margin-right: 8px;"></i> Aggiungi alla lista
                </button>
            </form>

            <div id="todo-list" class="todo-list">
                <!-- Task items will be injected here -->
                <div style="text-align: center; color: var(--text-muted); padding: 40px;">
                    Caricamento della tua agenda...
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for editing (hidden by default) -->
    <!-- (Optional: could implement inline edit instead for simplicity) -->

    <script src="script.js"></script>
    <script>
        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
