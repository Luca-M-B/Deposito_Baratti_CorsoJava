<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="main-layout(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security App | Premium Experience</title>
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a th:href="@{/}" class="logo">SecurePortal</a>
                <ul class="nav-links">
                    <li><a th:href="@{/public/hello}">Public</a></li>
                    <li sec:authorize="isAuthenticated()"><a th:href="@{/user/info}">Dashboard</a></li>
                    <li sec:authorize="!isAuthenticated()"><a th:href="@{/login}" class="btn btn-primary" style="padding: 0.5rem 1rem">Login</a></li>
                    <li sec:authorize="isAuthenticated()">
                        <form th:action="@{/logout}" method="post" style="display:inline">
                            <button type="submit" class="btn btn-accent" style="padding: 0.5rem 1rem">Logout</button>
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div th:replace="${content}">
            <!-- Page content goes here -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 SecurePortal. Tutti i diritti riservati.</p>
            <p style="font-size: 0.75rem; margin-top: 0.5rem;">Progettato per un'esperienza adulta e rilassante.</p>
        </div>
    </footer>
</body>
</html>
