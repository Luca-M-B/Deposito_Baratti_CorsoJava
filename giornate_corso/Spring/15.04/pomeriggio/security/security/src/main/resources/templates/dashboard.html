<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: main-layout(~{::section})}">
<body>
    <section>
        <div class="container">
            <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3rem">
                <h1>Il tuo Profilo</h1>
                <p>Oggi è il <span th:text="${#calendars.format(#calendars.createNow(), 'dd MMMM yyyy')}">15 Aprile 2026</span></p>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem">
                <aside>
                    <div class="card" style="padding: 1.5rem">
                        <div class="text-center" style="margin-bottom: 1.5rem">
                            <div style="width: 80px; height: 80px; background: var(--border); border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-muted)">
                                <span th:text="${#strings.substring(user.name,0,1).toUpperCase()}">U</span>
                            </div>
                            <h3 th:text="${user.name}">Nome Utente</h3>
                            <p style="font-size: 0.875rem" th:text="${user.authorities}">RUOLI</p>
                        </div>
                        <ul style="list-style: none; border-top: 1px solid var(--border); padding-top: 1rem">
                            <li><a href="#" style="text-decoration: none; color: var(--primary); font-weight: 500; display: block; padding: 0.5rem 0">Impostazioni Account</a></li>
                            <li><a href="#" style="text-decoration: none; color: var(--primary); font-weight: 500; display: block; padding: 0.5rem 0">Privacy e Sicurezza</a></li>
                            <li><a href="#" style="text-decoration: none; color: var(--primary); font-weight: 500; display: block; padding: 0.5rem 0">Notifiche</a></li>
                        </ul>
                    </div>
                </aside>

                <div class="card" style="padding: 2.5rem">
                    <h2 style="margin-bottom: 2rem; color: var(--primary)">Dettagli Sessione</h2>
                    
                    <div style="background: var(--bg); padding: 1.5rem; border-radius: 0.75rem; border: 1px solid var(--border)">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem">
                            <span style="font-weight: 600">Username:</span>
                            <span th:text="${user.name}">admin</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem">
                            <span style="font-weight: 600">Metodo Autenticazione:</span>
                            <span>Standard Form Login</span>
                        </div>
                        <div style="display: flex; justify-content: space-between">
                            <span style="font-weight: 600">Stato:</span>
                            <span style="color: var(--accent); font-weight: 700">Attivo</span>
                        </div>
                    </div>

                    <div style="margin-top: 2rem">
                        <h3 style="margin-bottom: 1rem; font-size: 1.125rem">Azioni Rapide</h3>
                        <div style="display: flex; gap: 1rem">
                            <a th:href="@{/public/hello}" class="btn btn-primary" style="font-size: 0.875rem">Vai all'Area Pubblica</a>
                            <a th:href="@{/admin/pannello}" sec:authorize="hasRole('ADMIN')" class="btn btn-accent" style="font-size: 0.875rem">Pannello Amministrativo</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
